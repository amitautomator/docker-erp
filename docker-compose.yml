services:
  postgres:
    image: postgres:latest
    container_name: postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-myapp}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 3

  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    container_name: pgbouncer_dev
    restart: unless-stopped
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: 5432
      DATABASES_USER: ${POSTGRES_USER:-postgres}
      DATABASES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASES_DBNAME: ${POSTGRES_DB:-myapp}
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 100
      PGBOUNCER_DEFAULT_POOL_SIZE: 20
    ports:
      - "127.0.0.1:6432:6432"
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:latest
    container_name: redis_dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    command: redis-server --appendonly yes --dir /data --maxmemory 256mb --maxmemory-policy allkeys-lru

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight_dev
    restart: unless-stopped
    environment:
      RI_DATA_PATH: /data
    ports:
      - "127.0.0.1:5540:5540"
    volumes:
      - redisinsight-data:/data
    networks:
      - backend
    depends_on:
      - redis

networks:
  backend:
    driver: bridge
    name: myapp-network

volumes:
  postgres-data:
    name: myapp-postgres-data
  redis-data:
    name: myapp-redis-data
  redisinsight-data:
    name: myapp-redisinsight-data
