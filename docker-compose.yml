services:
  postgres:
    image: postgres:latest
    container_name: postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-myapp}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 3

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_dev
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "True"
      PGADMIN_CONFIG_SESSION_DB_PATH: "'/var/lib/pgadmin/sessions'"
    ports:
      - "127.0.0.1:5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - backend
    depends_on:
      - postgres

  redis:
    image: redis:latest
    container_name: redis_dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    command: redis-server --appendonly yes --dir /data --maxmemory 256mb --maxmemory-policy allkeys-lru

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight_dev
    restart: unless-stopped
    environment:
      RI_DATA_PATH: /data
    ports:
      - "127.0.0.1:5540:5540"
    volumes:
      - redisinsight-data:/data
    networks:
      - backend
    depends_on:
      - redis

networks:
  backend:
    driver: bridge
    name: myapp-network

volumes:
  postgres-data:
    name: myapp-postgres-data
  redis-data:
    name: myapp-redis-data
  pgadmin-data:
    name: myapp-pgadmin-data
  redisinsight-data:
    name: myapp-redisinsight-data
